name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }} -X main.commit=$(git rev-parse --short HEAD)" \
            -o "dist/gts_${{ matrix.goos }}_${{ matrix.goarch }}" \
            ./cmd/gts
      - uses: actions/upload-artifact@v4
        with:
          name: gts_${{ steps.ver.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/gts_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 90
