version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gts
    main: ./cmd/gts
    binary: gts
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

archives:
  - id: gts
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

# Homebrew tap publishing is disabled until the tap repo exists and the
# HOMEBREW_TAP_TOKEN secret is set.
#
# To enable:
#   1. Create the tap repo (e.g. dankozlowski/homebrew-gts) on GitHub.
#   2. Generate a PAT with contents:write on that repo.
#   3. Add the PAT as the HOMEBREW_TAP_TOKEN secret on this repo.
#   4. Uncomment the block below (correcting the owner if different).
#
# brews:
#   - repository:
#       owner: dankozlowski
#       name: homebrew-gts
#     homepage: https://github.com/dankozlowski/gt-stack
#     description: A Graphite-style CLI for managing stacked git PRs
#     license: MIT
#     test: |
#       system "#{bin}/gts version"
#     install: |
#       bin.install "gts"
